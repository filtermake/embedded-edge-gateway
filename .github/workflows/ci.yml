name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: build (zero-warning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsqlite3-dev libmosquitto-dev

      # 把警告当错误,守住项目「零警告」基线(-Wall -Wextra -Wpedantic 已在 gateway_options 里)
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror"

      - name: Build
        run: cmake --build build -j
