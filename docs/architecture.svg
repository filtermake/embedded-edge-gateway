<svg width="900" height="720" viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<title>Embedded edge gateway data flow (uplink + downlink)</title>
<desc>An STM32 node exchanges binary frames with the gateway over a bidirectional UART. Uplink: a serial channel reads sensor frames, a frame parser (state machine + CRC16) decodes them, and a thread pool double-writes each record to a SQLite database and to an MQTT broker. Downlink: the MQTT broker delivers commands to the mosquitto network thread, which enqueues them and wakes the main loop via eventfd; the main loop builds a frame and writes it to the serial port, tracking it in an inflight table. Acknowledgements come back over serial, are matched by the parser/handleAck and republished to MQTT; a timerfd periodically rescans the inflight table to resend on timeout. A separate HTTP monitor thread reads the database over a read-only connection and serves a browser dashboard. A signal channel reloads config on SIGHUP.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="900" height="720" fill="#ffffff"/>

<!-- ============ External: STM32 ============ -->
<rect x="24" y="300" width="150" height="110" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="99" y="336" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">STM32 node</text>
<text x="99" y="358" text-anchor="middle" font-size="11" fill="#5F5E5A">sensors (DHT11/BH1750)</text>
<text x="99" y="376" text-anchor="middle" font-size="11" fill="#5F5E5A">+ actuator (sampling)</text>

<!-- ============ Gateway container ============ -->
<rect x="230" y="40" width="600" height="648" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="246" y="66" font-size="14" font-weight="500" fill="#0C447C">gateway process · single binary</text>

<!-- UART: sensor frames up (STM32 -> serial channel) -->
<text x="184" y="322" text-anchor="start" font-size="11" fill="#5F5E5A">sensor ↑</text>
<path d="M174 330 L210 330 L210 142 L260 142" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- UART: command frames down (build/write -> STM32) -->
<text x="184" y="412" text-anchor="start" font-size="11" fill="#5F5E5A">cmd ↓</text>
<path d="M260 446 L196 446 L196 392 L176 392" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ============ Main thread event loop ============ -->
<rect x="246" y="84" width="200" height="580" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="256" y="104" font-size="13" font-weight="500" fill="#085041">main thread · one epoll loop</text>

<!-- serial channel -->
<rect x="262" y="120" width="168" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="346" y="138" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">serial channel</text>
<text x="346" y="155" text-anchor="middle" font-size="11" fill="#0F6E56">epoll ET · read</text>
<line x1="346" y1="164" x2="346" y2="178" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- frame parser -->
<rect x="262" y="178" width="168" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="346" y="196" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">frame parser</text>
<text x="346" y="213" text-anchor="middle" font-size="11" fill="#0F6E56">FSM + CRC16</text>

<!-- inflight annotation -->
<text x="262" y="262" font-size="11" font-weight="500" fill="#085041">inflight table (seq → cmd)</text>
<text x="262" y="279" font-size="10.5" fill="#0F6E56">only this thread touches it:</text>
<text x="262" y="294" font-size="10.5" fill="#0F6E56">send · ACK · retry → lock-free</text>

<!-- eventfd channel -->
<rect x="262" y="366" width="168" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="346" y="384" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">eventfd channel</text>
<text x="346" y="401" text-anchor="middle" font-size="11" fill="#0F6E56">downlink trigger</text>
<line x1="346" y1="410" x2="346" y2="424" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- build frame -> write -->
<rect x="262" y="424" width="168" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="346" y="442" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">build frame → write</text>
<text x="346" y="459" text-anchor="middle" font-size="11" fill="#0F6E56">single writer of serial</text>

<!-- timerfd -->
<rect x="262" y="486" width="168" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="346" y="503" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">timerfd · retry scan</text>
<text x="346" y="518" text-anchor="middle" font-size="10.5" fill="#0F6E56">resend inflight on timeout</text>
<path d="M346 486 L346 470" fill="none" stroke="#73726c" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<!-- signal -->
<rect x="262" y="538" width="168" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="346" y="555" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">signal channel</text>
<text x="346" y="570" text-anchor="middle" font-size="10.5" fill="#5F5E5A">SIGHUP → reload config</text>

<!-- ============ Col 3: pool / handleAck / mosquitto / http ============ -->
<!-- thread pool -->
<rect x="486" y="120" width="176" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="574" y="143" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">thread pool</text>
<text x="574" y="160" text-anchor="middle" font-size="11" fill="#534AB7">double write per record</text>

<!-- handleAck -->
<rect x="486" y="186" width="176" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="574" y="206" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">handleAck</text>
<text x="574" y="223" text-anchor="middle" font-size="11" fill="#0F6E56">match inflight → MQTT</text>

<!-- mosquitto thread -->
<rect x="486" y="366" width="176" height="96" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="574" y="388" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">mosquitto net thread</text>
<text x="574" y="405" text-anchor="middle" font-size="11" fill="#0F6E56">cmd handler: topic→DownCmd</text>
<rect x="500" y="418" width="148" height="34" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="574" y="439" text-anchor="middle" font-size="11" fill="#2C2C2A">queue.push + eventfd wake</text>

<!-- HTTP monitor thread -->
<rect x="486" y="540" width="176" height="118" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="574" y="564" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">HTTP monitor thread</text>
<text x="574" y="581" text-anchor="middle" font-size="11" fill="#0F6E56">epoll + idle timeout</text>
<rect x="500" y="600" width="148" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="574" y="620" text-anchor="middle" font-size="11" font-weight="500" fill="#633806">read-only conn</text>
<text x="574" y="635" text-anchor="middle" font-size="10.5" fill="#854F0B">→ GET /api/data</text>

<!-- ============ Col 4: SQLite / broker / browser ============ -->
<rect x="694" y="120" width="120" height="54" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="754" y="143" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">SQLite (rw)</text>
<text x="754" y="160" text-anchor="middle" font-size="11" fill="#854F0B">WAL · gateway.db</text>

<rect x="694" y="300" width="120" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="754" y="325" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">MQTT broker</text>
<text x="754" y="343" text-anchor="middle" font-size="11" fill="#993C1D">uplink + cmd</text>

<rect x="694" y="566" width="120" height="70" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="754" y="596" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">browser</text>
<text x="754" y="614" text-anchor="middle" font-size="11" fill="#5F5E5A">cards + uPlot</text>

<!-- ============ Uplink arrows ============ -->
<!-- parser -> thread pool (sensor) -->
<text x="468" y="140" text-anchor="end" font-size="11" fill="#5F5E5A">sensor</text>
<path d="M430 192 L470 192 L470 147 L484 147" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- parser -> handleAck (ACK) -->
<text x="458" y="246" text-anchor="middle" font-size="11" fill="#5F5E5A">ACK 0x05/0x06</text>
<path d="M430 210 L470 210 L470 211 L484 211" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- pool -> SQLite -->
<text x="678" y="140" text-anchor="middle" font-size="11" fill="#5F5E5A">write</text>
<path d="M662 147 L692 147" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- pool -> broker (publish up) -->
<text x="688" y="268" text-anchor="end" font-size="11" fill="#5F5E5A">publish up/&lt;dev&gt;</text>
<path d="M662 158 L676 158 L676 318 L692 318" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- handleAck -> broker (ack/resp) -->
<text x="688" y="287" text-anchor="end" font-size="11" fill="#5F5E5A">ack / resp</text>
<path d="M662 211 L684 211 L684 330 L692 330" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ============ Downlink arrows ============ -->
<!-- broker -> mosquitto thread (subscribe cmd) -->
<text x="690" y="392" text-anchor="end" font-size="11" fill="#5F5E5A">gateway/cmd/#</text>
<path d="M694 348 L676 348 L676 400 L664 400" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- mosquitto thread -> eventfd channel (wake) -->
<text x="458" y="430" text-anchor="middle" font-size="11" fill="#5F5E5A">wake</text>
<path d="M486 414 L458 414 L458 388 L432 388" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ============ Monitor arrows ============ -->
<!-- SQLite -> HTTP monitor (WAL read) -->
<text x="746" y="500" text-anchor="end" font-size="11" fill="#5F5E5A">WAL read</text>
<path d="M754 174 L754 512 L664 512" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- HTTP monitor -> browser -->
<text x="678" y="588" text-anchor="middle" font-size="11" fill="#5F5E5A">:8888</text>
<path d="M662 600 L692 600" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
