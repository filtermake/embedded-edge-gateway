<svg width="1060" height="580" viewBox="0 0 1060 580" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<title>Embedded edge gateway architecture (uplink + downlink)</title>
<desc>An STM32 node exchanges binary frames with the gateway over a bidirectional UART. Uplink (top, left to right): a serial channel reads sensor frames, a frame parser with CRC16 decodes them, a thread pool double-writes each record to a SQLite database and publishes to an MQTT broker. ACK and query-response frames are matched against an inflight table and republished to MQTT. Downlink (bottom, right to left): the MQTT broker delivers commands to the mosquitto network thread, which enqueues them and wakes the main loop via eventfd; the main loop builds a frame and writes it to the serial port, registering it in the inflight table, and a timerfd resends on timeout. A separate HTTP monitor thread reads SQLite over a read-only connection and serves a browser dashboard. A signal channel reloads config on SIGHUP.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="1060" height="580" fill="#ffffff"/>

<!-- ===================== External actors ===================== -->
<!-- STM32 (left, spans both bands) -->
<rect x="30" y="110" width="150" height="300" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="250" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">STM32 node</text>
<text x="105" y="272" text-anchor="middle" font-size="11" fill="#5F5E5A">sensors + actuator</text>
<text x="105" y="289" text-anchor="middle" font-size="11" fill="#5F5E5A">UART, binary frames</text>

<!-- MQTT broker (right, spans both bands) -->
<rect x="880" y="120" width="160" height="240" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="960" y="234" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">MQTT broker</text>
<text x="960" y="256" text-anchor="middle" font-size="11" fill="#993C1D">uplink + downlink</text>

<!-- browser (right, bottom) -->
<rect x="880" y="448" width="160" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="960" y="476" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">browser</text>
<text x="960" y="494" text-anchor="middle" font-size="11" fill="#5F5E5A">cards + uPlot</text>

<!-- ===================== Gateway process ===================== -->
<rect x="210" y="70" width="620" height="480" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="226" y="96" font-size="14" font-weight="500" fill="#0C447C">gateway process · single binary</text>

<!-- main thread event loop container -->
<rect x="226" y="104" width="210" height="430" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="240" y="124" font-size="12.5" font-weight="500" fill="#085041">main thread · epoll loop</text>

<!-- serial channel -->
<rect x="240" y="132" width="182" height="44" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
<text x="331" y="150" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">serial channel</text>
<text x="331" y="167" text-anchor="middle" font-size="11" fill="#0F6E56">epoll ET · read</text>

<!-- frame parser -->
<rect x="240" y="194" width="182" height="44" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
<text x="331" y="212" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">frame parser</text>
<text x="331" y="229" text-anchor="middle" font-size="11" fill="#0F6E56">FSM + CRC16</text>

<!-- inflight table (dashed) -->
<rect x="240" y="248" width="182" height="52" rx="8" fill="#EAF6F1" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3"/>
<text x="331" y="268" text-anchor="middle" font-size="12.5" font-weight="500" fill="#085041">inflight table · seq→cmd</text>
<text x="331" y="285" text-anchor="middle" font-size="10.5" fill="#0F6E56">main-thread only → lock-free</text>

<!-- eventfd channel -->
<rect x="240" y="312" width="182" height="44" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
<text x="331" y="330" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">eventfd channel</text>
<text x="331" y="347" text-anchor="middle" font-size="11" fill="#0F6E56">downlink trigger</text>

<!-- build / write -->
<rect x="240" y="374" width="182" height="44" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
<text x="331" y="392" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">build frame → write</text>
<text x="331" y="409" text-anchor="middle" font-size="11" fill="#0F6E56">sole writer of serial</text>

<!-- timerfd -->
<rect x="240" y="438" width="182" height="40" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
<text x="331" y="455" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">timerfd</text>
<text x="331" y="470" text-anchor="middle" font-size="10.5" fill="#0F6E56">retry scan inflight</text>

<!-- signal -->
<rect x="240" y="490" width="182" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="331" y="507" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">signal channel</text>
<text x="331" y="522" text-anchor="middle" font-size="10.5" fill="#5F5E5A">SIGHUP → reload config</text>

<!-- thread pool -->
<rect x="500" y="194" width="170" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="585" y="212" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">thread pool</text>
<text x="585" y="229" text-anchor="middle" font-size="11" fill="#534AB7">double write</text>

<!-- handleAck -->
<rect x="500" y="252" width="170" height="40" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
<text x="585" y="269" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">handleAck</text>
<text x="585" y="284" text-anchor="middle" font-size="10.5" fill="#0F6E56">match inflight → MQTT</text>

<!-- mosquitto thread -->
<rect x="500" y="304" width="170" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="585" y="324" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">mosquitto net thread</text>
<text x="585" y="341" text-anchor="middle" font-size="10.5" fill="#0F6E56">cmd → queue + eventfd wake</text>
<text x="585" y="356" text-anchor="middle" font-size="10.5" fill="#0F6E56">(never writes serial)</text>

<!-- HTTP monitor thread -->
<rect x="500" y="438" width="170" height="84" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="585" y="461" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">HTTP monitor thread</text>
<text x="585" y="478" text-anchor="middle" font-size="10.5" fill="#0F6E56">epoll + idle timeout</text>
<rect x="514" y="486" width="142" height="28" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="585" y="504" text-anchor="middle" font-size="10.5" fill="#633806">read-only conn → /api/data</text>

<!-- SQLite -->
<rect x="700" y="194" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="760" y="212" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">SQLite</text>
<text x="760" y="229" text-anchor="middle" font-size="11" fill="#854F0B">WAL · rw conn</text>

<!-- ===================== Uplink arrows (top) ===================== -->
<!-- STM32 -> serial -->
<text x="186" y="148" text-anchor="start" font-size="10.5" fill="#5F5E5A">sensor ↑</text>
<path d="M180 154 L240 154" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- serial -> parser -->
<path d="M331 176 L331 194" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- parser -> thread pool -->
<text x="461" y="209" text-anchor="middle" font-size="10.5" fill="#5F5E5A">sensor</text>
<path d="M422 216 L500 216" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- pool -> SQLite -->
<text x="685" y="209" text-anchor="middle" font-size="10.5" fill="#5F5E5A">write</text>
<path d="M670 216 L700 216" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- pool -> MQTT (publish up) -->
<text x="708" y="130" text-anchor="middle" font-size="10.5" fill="#5F5E5A">publish gateway/up/&lt;dev&gt;</text>
<path d="M585 194 L585 136 L880 136" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- parser -> handleAck (ACK) -->
<text x="455" y="245" text-anchor="middle" font-size="10.5" fill="#5F5E5A">ACK</text>
<path d="M422 228 L468 228 L468 272 L500 272" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- handleAck -> MQTT (ack/resp) -->
<text x="775" y="265" text-anchor="middle" font-size="10.5" fill="#5F5E5A">ack / resp</text>
<path d="M670 272 L880 272" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===================== Downlink arrows (bottom) ===================== -->
<!-- MQTT -> mosquitto (cmd) -->
<text x="775" y="328" text-anchor="middle" font-size="10.5" fill="#5F5E5A">gateway/cmd/#</text>
<path d="M880 334 L670 334" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- mosquitto -> eventfd (wake) -->
<text x="461" y="328" text-anchor="middle" font-size="10.5" fill="#5F5E5A">wake</text>
<path d="M500 334 L422 334" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- eventfd -> build -->
<path d="M331 356 L331 374" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- build -> STM32 (cmd) -->
<text x="186" y="389" text-anchor="start" font-size="10.5" fill="#5F5E5A">cmd ↓</text>
<path d="M240 396 L180 396" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- timerfd -> build (resend, dotted) -->
<text x="345" y="432" text-anchor="start" font-size="10.5" fill="#5F5E5A">resend</text>
<path d="M331 438 L331 420" fill="none" stroke="#73726c" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<!-- ===================== Monitor arrows ===================== -->
<!-- SQLite -> HTTP monitor (WAL read), routed left of column C3 to avoid boxes -->
<text x="612" y="244" text-anchor="middle" font-size="10.5" fill="#5F5E5A">WAL read (RO)</text>
<path d="M760 238 L760 250 L480 250 L480 478 L500 478" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- HTTP monitor -> browser -->
<text x="775" y="472" text-anchor="middle" font-size="10.5" fill="#5F5E5A">HTTP :8888</text>
<path d="M670 480 L880 480" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
